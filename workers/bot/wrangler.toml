name = "ptt-notify-bot"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "ptt-notify-bot-db"
# 執行 `wrangler d1 create ptt-notify-bot-db` 取得，或查看 Cloudflare Dashboard → D1
database_id = "4f64d28c-2797-41c6-93ce-15beb5533e67"

[vars]
# Admin Telegram user ID — receives feedback and error alerts.
# Get via @userinfobot. Also settable via: wrangler secret put ADMIN_TELEGRAM_ID
ADMIN_TELEGRAM_ID = ""

# ── Secrets (set via `wrangler secret put`, never commit values) ─────────────
# BOT_TOKEN        — Telegram Bot token from @BotFather
# GH_TOKEN         — GitHub PAT with actions:write scope (dispatches crawl/notify workflows)
# GH_REPO          — GitHub repo in owner/repo format (e.g. "ming780922/ptt-notify-bot")
# MINIAPP_URL      — Cloudflare Pages URL for the Mini App (e.g. "https://ptt-notify-miniapp.pages.dev")
# INTERNAL_SECRET  — Shared secret for /internal/* API endpoints; generate with: openssl rand -hex 32

[triggers]
# */5：enqueue boards + dispatch crawler
# 2-57/5：dispatch notifier + send pending notifications
crons = ["*/5 * * * *", "2-57/5 * * * *"]
