name = "ptt-notify-bot"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "ptt-notify-bot-db"
# 執行 `wrangler d1 create ptt-notify-bot-db` 取得，或查看 Cloudflare Dashboard → D1
database_id = "4f64d28c-2797-41c6-93ce-15beb5533e67"

[vars]
ADMIN_TELEGRAM_ID = ""   # 部署後填入或使用 wrangler secret put ADMIN_TELEGRAM_ID

[triggers]
# */5：enqueue boards + dispatch crawler
# 2-57/5：dispatch notifier + send pending notifications
crons = ["*/5 * * * *", "2-57/5 * * * *"]
