name = "ptt-notify-bot-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
# Ad feature toggles — set to "true" to enable the ad gate for each feature.
# All default to "false" (fully open access). Change and redeploy to toggle.
AD_ENABLED_ADD_BOARD   = "false"   # Adding a board beyond FREE_BOARDS_LIMIT requires an ad
AD_ENABLED_ADD_KEYWORD = "false"   # Adding a keyword beyond free limit requires an ad
AD_ENABLED_UNLOCK      = "false"   # Full notifications beyond rank 2 require an ad unlock

# Local development only — allows `hash=debug_mode` to bypass initData verification.
# MUST remain "false" in production. deploy-api.yml enforces this at deploy time.
DEBUG_MODE             = "false"

# ── Secrets (set via `wrangler secret put`, never commit values) ─────────────
# BOT_TOKEN        — Telegram Bot token from @BotFather (used to verify initData + send admin msgs)
# INTERNAL_SECRET  — Shared secret for /internal/* endpoints; must match the bot worker and GitHub Actions secret

[[d1_databases]]
binding = "DB"
database_name = "ptt-notify-bot-db"
# 與 bot worker 共用同一個 D1 資料庫，database_id 需保持一致
database_id = "4f64d28c-2797-41c6-93ce-15beb5533e67"
