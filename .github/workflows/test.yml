name: Test

on:
  push:
    branches: [main]
    paths:
      - 'crawler/**'
  pull_request:
    paths:
      - 'crawler/**'

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 pytest pytest-asyncio

      - name: Run tests
        run: pytest crawler/tests/ -v
