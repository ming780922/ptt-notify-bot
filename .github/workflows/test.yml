name: Test

on:
  push:
    branches: [main]
    paths:
      - 'crawler/**'
      - 'workers/**'
  pull_request:
    paths:
      - 'crawler/**'
      - 'workers/**'

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run tests
        run: pytest crawler/tests/ -v

  typecheck-workers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Typecheck bot worker
        working-directory: workers/bot
        run: npm ci && npm run typecheck

      - name: Typecheck api worker
        working-directory: workers/api
        run: npm ci && npm run typecheck
