name: Deploy Mini App

on:
  push:
    branches: [main]
    paths:
      - 'miniapp/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miniapp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: miniapp

      - name: Build
        run: npm run build
        working-directory: miniapp

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4b4513475f5ee541622faacd26d279a6
        run: npx wrangler pages deploy out --project-name ptt-notify-miniapp
        working-directory: miniapp
