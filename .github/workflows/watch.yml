name: Watch Crawler

on:
  repository_dispatch:
    types: [watch]

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run watch crawler
        working-directory: crawler
        env:
          API_WORKER_URL: ${{ secrets.API_WORKER_URL }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
        run: python watch_crawler.py
