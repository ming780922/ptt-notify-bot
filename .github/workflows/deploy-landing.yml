name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4b4513475f5ee541622faacd26d279a6
        run: npx wrangler pages deploy landing --project-name ptt-notify-landing
