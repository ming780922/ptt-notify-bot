<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PTT通知機器人</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v={{VERSION}}" />
  <!-- Monetag Rewarded Interstitial SDK -->
  <script src='//libtl.com/sdk.js' data-zone='10832818' data-sdk='show_10832818'></script>
</head>

<body>
  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <div id="app">
    <div id="subscription-list"></div>
  </div>

  <!-- ── Bottom bar ─────────────────────────────────────────────────────── -->
  <div id="bottom-bar" class="bottom-bar hidden">
    <div id="unlock-bar" class="unlock-bar hidden">
      <div class="unlock-info">
        <span id="unlock-label" class="unlock-label"></span>
        <button id="unlock-hint-btn" class="unlock-hint-btn hidden">？</button>
        <div id="unlock-hint-tooltip" class="unlock-hint-tooltip hidden"></div>
      </div>
      <button id="unlock-action-btn" class="unlock-action-btn hidden"></button>
    </div>
    <div class="bottom-actions">
      <button id="add-btn" class="add-btn">＋ 新增看板</button>
      <button id="feedback-btn" class="feedback-btn">💬 意見回饋</button>
    </div>
  </div>

  <!-- ── Modal: Add board ───────────────────────────────────────────────── -->
  <div id="modal-add" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">新增看板</span>
        <button class="modal-close" data-close="modal-add">✕</button>
      </div>
      <div id="modal-add-body" class="modal-body">
        <div id="modal-add-loading" class="spinner hidden"></div>
        <div id="modal-add-ui">
          <input id="board-search" class="search-input" type="text" placeholder="搜尋看板名稱…" autocomplete="off" />
          <div id="search-results" class="board-grid hidden"></div>
          <p class="section-label">熱門看板</p>
          <div id="popular-boards" class="board-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Edit board ─────────────────────────────────────────────── -->
  <div id="modal-edit" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <span id="edit-board-name" class="modal-title"></span>
        <button class="modal-close" data-close="modal-edit">✕</button>
      </div>
      <div class="modal-body">
        <div class="keyword-section">
          <p class="section-label">關鍵字過濾</p>
          <div id="keyword-tags" class="keyword-tags"></div>
          <div id="keyword-add-row" class="keyword-add-row">
            <input id="keyword-input" class="keyword-input" type="text" placeholder="輸入關鍵字…" maxlength="20"
              autocomplete="off" />
            <button id="keyword-add-btn" class="keyword-add-btn">＋</button>
          </div>
          <p id="keyword-limit-info" class="keyword-limit-info"></p>
        </div>
        <button id="delete-btn" class="delete-btn">刪除訂閱</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Confirm delete ──────────────────────────────────────────── -->
  <div id="modal-confirm" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet modal-sheet--sm">
      <div class="modal-header">
        <span class="modal-title">確認刪除</span>
      </div>
      <div class="modal-body">
        <p id="confirm-text" class="confirm-text"></p>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="btn-secondary">取消</button>
          <button id="confirm-ok" class="btn-danger">刪除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mock Ad Modal -->
  <div id="modal-ad-mock" class="modal hidden">
    <div class="modal-content ad-content">
      <div class="ad-header">
        <span class="ad-label">贊助商廣告</span>
        <span id="ad-countdown" class="ad-timer hidden">5</span>
      </div>
      <div class="ad-body">
        <div class="ad-placeholder">
          <div class="ad-icon">🎁</div>
          <div class="ad-title">解鎖進階功能</div>
          <p>觀看完整廣告，即可解鎖 24 小時<br>無限看板訂閱與即時通知！</p>
        </div>
      </div>
      <div class="ad-actions">
        <button id="ad-close-btn" class="ad-close-btn hidden">關閉廣告並解鎖</button>
        <button id="ad-cancel-btn" class="ad-cancel-btn">取消</button>
      </div>
    </div>
  </div>

  <script src="app.js?v={{VERSION}}"></script>
</body>

</html>
